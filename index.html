<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AWS Amplify Test Site</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="container">
        <h1>🚀 Welcome to My Amplify Test Website V1</h1>
        <p>This website is deployed using AWS Amplify.</p>
        <button onclick="showMessage()">Click Me</button>
        <p id="message"></p>
    </div>

    <script>
        function showMessage() {
            document.getElementById("message").innerText =
                "🎉 Your website is working perfectly on AWS Amplify!";
        }
    </script>

</body>
</html>
